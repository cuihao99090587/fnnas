name: Build FnOS for Lenovo-ECB-PR51

on:
  workflow_dispatch:
    inputs:
      kernel_tags:
        description: 'KERNEL_TAGS (内核标签)'
        required: true
        default: 'rk35xx/stable'
        type: choice
        options:
          - 'rk35xx/stable'
          - 'rk35xx/6.1.y'
          - 'stable'
      kernel_version:
        description: '内核版本'
        required: true
        default: '6.12.y'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout your forked fnnas repository
        uses: actions/checkout@v4
        with:
          path: fnnas
          fetch-depth: 0

      - name: Install dependencies and DTC
        run: |
          sudo apt-get update
          sudo apt-get install -y device-tree-compiler build-essential flex bison libssl-dev bc u-boot-tools

      - name: Setup kernel headers for DTC
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://github.com/torvalds/linux.git
          cd linux
          git sparse-checkout set include/dt-bindings
          cd ..

      - name: Compile DTS to DTB (using final dts)
        run: |
          cd fnnas
          DTS_PATH=$(find . -name "rk3568-ecb-pr51-final.dts" | head -1)
          if [ -n "$DTS_PATH" ]; then
            echo "Found DTS: $DTS_PATH"
            dtc -I dts -O dtb -o rk3568-ecb-pr51-final.dtb -i ../linux/include "$DTS_PATH"
            echo "DTB compiled successfully"
          else
            echo "ERROR: rk3568-ecb-pr51-final.dts not found"
            exit 1
          fi

      - name: Place DTB to platform directory
        run: |
          cd fnnas
          mkdir -p make-fnnas/fnnas-files/platform-files/rockchip/bootfs/dtb/rockchip/
          if [ -f "rk3568-ecb-pr51-final.dtb" ]; then
            cp rk3568-ecb-pr51-final.dtb make-fnnas/fnnas-files/platform-files/rockchip/bootfs/dtb/rockchip/
          fi

      - name: Add AP6256 firmware files to overlay
        run: |
          cd fnnas
          mkdir -p make-fnnas/fnnas-files/overlay/lib/firmware/brcm/
          if [ -d "wifi_bt_固件" ]; then
            cp -v wifi_bt_固件/* make-fnnas/fnnas-files/overlay/lib/firmware/brcm/ 2>/dev/null || true
          else
            echo "Warning: wifi_bt_固件 directory not found"
          fi

      - name: Update model database with correct DTB
        run: |
          cd fnnas
          DB_FILE="make-fnnas/fnnas-files/common-files/etc/model_database.conf"
          if grep -q "Lenovo-ECB-PR51" "$DB_FILE"; then
            cp "$DB_FILE" "${DB_FILE}.bak"
            sed -i 's/rk3568-ecb-pr51\.dtb/rk3568-ecb-pr51-final.dtb/g' "$DB_FILE"
          else
            # 使用 echo 追加，避免 heredoc 的 YAML 语法问题
            echo 'r999:Lenovo-ECB-PR51:rk3568:rk3568-ecb-pr51-final.dtb:NA:u-boot.itb:idbloader.img:8GB-DDR4,32GB-eMMC,2x1Gb-Nic,3xSATA,2xUSB3.0:rk35xx/stable:rockchip:rk3568:fnnasEnv.txt:cuihao99090587:ecb-pr51:yes' >> "$DB_FILE"
          fi

      - name: Build FnOS for ECB-PR51
        env:
          KERNEL_TAGS: ${{ github.event.inputs.kernel_tags }}
        run: |
          cd fnnas
          chmod +x rebuild
          sudo -E ./rebuild -b Lenovo-ECB-PR51 -k ${{ github.event.inputs.kernel_version }} -a true -n fnos-ecb-pr51

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fnos-ecb-pr51-${{ github.run_number }}
          path: fnnas/build/output/images/*.img.gz
          retention-days: 30
