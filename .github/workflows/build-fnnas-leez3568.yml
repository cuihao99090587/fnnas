name: Build FnNAS for Leez-3568

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Select board to build'
        required: true
        default: 'leez-3568'
        type: choice
        options:
          - leez-3568
          - nanopi-r5s
          - nanopi-r5c
          - r66s
          - r68s
      kernel_version:
        description: 'Kernel version (e.g., 6.12.y)'
        required: true
        default: '6.12.y'
        type: string
      auto_reboot:
        description: 'Auto create release'
        required: false
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build FnNAS for ${{ inputs.board }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Prepare build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl tar gzip xz-utils
      
      - name: Prepare build scripts
        run: |
          chmod +x make-fnnas/scripts/*
          chmod +x renas
      
      - name: Download base image
        run: |
          mkdir -p fnnas-arm64
          cd fnnas-arm64
          echo "Downloading FnNAS official base image..."
          # Download from official fnnas_base_image release
          wget -q --show-progress https://github.com/ophub/fnnas/releases/download/fnnas_base_image/fnnas-official-arm64-image_rockchip_692.img.xz || \
          wget -q --show-progress https://github.com/ophub/fnnas/releases/download/fnnas_rockchip_692/fnnas_rockchip_nanopi-r5s_k6.12.41_2026.03.22.img.gz
          
          # Extract based on file extension
          for file in *.img.xz; do
            if [ -f "$file" ]; then
              echo "Extracting $file..."
              xz -dk "$file"
            fi
          done
          
          for file in *.img.gz; do
            if [ -f "$file" ]; then
              echo "Extracting $file..."
              gunzip -k "$file"
            fi
          done
          
          # Verify
          ls -lh *.img
          echo "Base image ready!"
      
      - name: Build FnNAS
        run: |
          sudo ./renas -b ${{ inputs.board }} -k ${{ inputs.kernel_version }}
      
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fnnas-${{ inputs.board }}-${{ inputs.kernel_version }}
          path: |
            fnnas/out/*.img.gz
            fnnas/out/*.dtb
          retention-days: 30
      
      - name: Create Release
        if: inputs.auto_reboot == 'true' && success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: fnnas-${{ inputs.board }}-${{ github.run_number }}
          name: FnNAS for ${{ inputs.board }} - Build #${{ github.run_number }}
          files: |
            fnnas/out/*.img.gz
            fnnas/out/*.dtb
          body: |
            ## FnNAS Firmware for ${{ inputs.board }}
            
            ### Build Information
            - **Board**: ${{ inputs.board }}
            - **Kernel**: ${{ inputs.kernel_version }}
            - **Build Date**: ${{ github.event.head_commit.timestamp }}
            - **Build Number**: ${{ github.run_number }}
            
            ### Files
            - Firmware image: fnnas-${{ inputs.board }}-*.img.gz
            - Device tree: rk3568-leez-3568.dtb
            
            ### Installation
            1. Download and extract the .img.gz file
            2. Write to SD card or eMMC using balenaEtcher or Rufus
            3. Insert into your device and power on
            
            ### Default Credentials
            - Username: root
            - Password: 1234
            
            ---
            Built with GitHub Actions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Board: ${{ inputs.board }}" >> $GITHUB_STEP_SUMMARY
          echo "- Kernel: ${{ inputs.kernel_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts: Check Actions tab" >> $GITHUB_STEP_SUMMARY
