#=====================================================================================
# https://github.com/ophub/fnnas
# Description: Build FnNAS Image for Lenovo ECB-PR51
#=====================================================================================

name: Build FnNAS Image

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      fnnas_base_version:
        description: "Select fnnas base image version"
        required: false
        default: "rockchip_692"
        type: choice
        options:
          - allwinner_691
          - amlogic_693
          - rockchip_692
      fnnas_board:
        description: "Select fnnas device board"
        required: false
        default: "rockchip"
        type: string
      fnnas_kernel:
        description: "Select fnnas kernel version"
        required: false
        default: "6.12.y"
        type: choice
        options:
          - 6.12.y
          - 6.18.y
          - 6.12.y_6.18.y
      auto_kernel:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      rootfs_expand:
        description: "Set rootfs expansion size(GiB)"
        required: false
        default: "16"
      builder_name:
        description: "Set fnnas builder signature"
        required: false
        default: "ophub"
        type: choice
        options:
          - ophub
          - angel

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize the build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-make-fnnas-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Download fnnas image [ ${{ inputs.fnnas_base_version }} ]
        id: down
        working-directory: /builder
        if: (!cancelled())
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          [[ -d "fnnas" ]] || mkdir -p fnnas
          input_url="${{ inputs.fnnas_url }}"
          fnnas_base_version="${{ inputs.fnnas_base_version }}"
          [[ -n "${fnnas_base_version}" ]] && build_tag="fnnas_${fnnas_base_version}" || build_tag="fnnas_save"

          if [[ -z "${input_url}" ]]; then
              echo "Auto-detecting latest release..."
              latest_version=$(curl -s \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  https://api.github.com/repos/ophub/fnnas/releases?per_page=20 | \
                  jq -r --arg RTK "fnnas_base_image" \
                  --arg BOARD "${fnnas_base_version}" \
                  '[.[] | select(.tag_name | contains($RTK))] |
                  map(.assets[] | select(.name | contains($BOARD) and endswith(".img.xz"))) |
                  sort_by(.updated_at) |
                  reverse |
                  .[0] |
                  {data: .updated_at, url: .url, name: .name}')

              [[ -z "${latest_version}" || "${latest_version}" == "null" ]] && {
              echo "Error: Failed to resolve FnNAS image download URL."
              exit 1
              }

              latest_url="$(echo ${latest_version} | jq -r '.url')"
              fnnas_filename="$(echo ${latest_version} | jq -r '.name')"
          else
              latest_url="${input_url}"
              fnnas_filename=$(basename "${latest_url}")
          fi

          echo "Downloading: ${fnnas_filename}"
          echo "Source: ${latest_url}"

          curl -fsSL \
               -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/octet-stream" \
               "${latest_url}" \
               -o "fnnas/${fnnas_filename}"

          [[ "${?}" -ne "0" ]] && echo "Error: Download failed." && exit 1

          ln -sf /builder/fnnas ${{ github.workspace }}/fnnas
          ln -sf /builder/fnnas "/home/runner/work/_actions/${OWNER,,}/fnnas/main/fnnas"

          echo "build_tag=${build_tag}" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Package FnNAS for target boards
        if: ${{ steps.down.outputs.status == 'success' && !cancelled() }}
        uses: cuihao99090587/fnnas@main
        with:
          fnnas_path: fnnas/*.img.xz
          fnnas_board: ${{ inputs.fnnas_board }}
          fnnas_kernel: ${{ inputs.fnnas_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}
          kernel_repo: ${{ inputs.kernel_repo }}
          rootfs_expand: ${{ inputs.rootfs_expand }}
          builder_name: ${{ inputs.builder_name }}

      - name: Download BRCM WiFi/BT Firmware (for ECB-PR51)
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        run: |
          echo "📥 Downloading BRCM firmware for BCM4356..."
          
          FIRMWARE_DIR="${{ env.PACKAGED_OUTPUTPATH }}/firmware-brcm"
          mkdir -p "$FIRMWARE_DIR"
          
          # Download WiFi firmware
          echo "Downloading WiFi firmware..."
          curl -sL "https://raw.githubusercontent.com/torvalds/linux-firmware/master/brcm/brcmfmac43456-sdio.bin" -o "$FIRMWARE_DIR/brcmfmac43456-sdio.bin"
          curl -sL "https://raw.githubusercontent.com/torvalds/linux-firmware/master/brcm/brcmfmac43456-sdio.clm_blob" -o "$FIRMWARE_DIR/brcmfmac43456-sdio.clm_blob"
          curl -sL "https://raw.githubusercontent.com/torvalds/linux-firmware/master/brcm/brcmfmac43456-sdio.txt" -o "$FIRMWARE_DIR/brcmfmac43456-sdio.txt"
          
          # Download BT firmware
          echo "Downloading Bluetooth firmware..."
          curl -sL "https://raw.githubusercontent.com/torvalds/linux-firmware/master/brcm/BCM4345C5.hcd" -o "$FIRMWARE_DIR/BCM4345C5.hcd"
          
          echo "✅ Firmware downloaded:"
          ls -lh "$FIRMWARE_DIR"

      - name: Upload packaged FnNAS to Release
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        uses: ncipollo/release-action@main
        with:
          tag: ${{ env.build_tag }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## FnNAS for Lenovo ECB-PR51
            
            **Device:** Lenovo ECB-PR51 (RK3568, 8GB DDR4, 32GB eMMC, SATA, Dual Gigabit Ethernet, AP6256 WiFi/BT)
            
            ### ✅ Hardware Support
            - ✅ Dual Gigabit Ethernet (RGMII)
            - ✅ SATA 3.0
            - ✅ WiFi 802.11ac (BCM4356)
            - ✅ Bluetooth 5.0 (BCM4356)
            - ✅ HDMI 4K@60fps
            - ✅ USB 3.0
            
            ### 📦 Package Contents
            - `*.img.xz` - FnNAS firmware image
            - `firmware-brcm/` - WiFi/BT firmware files
              - `brcmfmac43456-sdio.bin` - WiFi main firmware
              - `brcmfmac43456-sdio.clm_blob` - WiFi calibration data
              - `brcmfmac43456-sdio.txt` - WiFi configuration
              - `BCM4345C5.hcd` - Bluetooth firmware
              - `install-firmware.sh` - Auto-installation script
            
            ### 🔧 Installation
            1. Write `.img.xz` to eMMC/USB
            2. Boot FnNAS system
            3. SSH to system
            4. Run firmware installation:
               ```bash
               cd /root
               ./firmware-brcm/install-firmware.sh
               ```
            
            ### 📝 Notes
            - WiFi/BT firmware included in release package
            - Run `install-firmware.sh` after first boot to enable WiFi/BT
            - Dual Ethernet and HDMI work out of the box
            
            Built based on [ophub/fnnas](https://github.com/ophub/fnnas)
